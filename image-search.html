<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>画像で製品検索</title>
<style>
:root {
  --blue:   #1565ff;
  --green:  #16a34a;
  --red:    #dc2626;
  --orange: #f97316;
  --bg:     #eef1f7;
  --card:   #ffffff;
  --border: #b8c0d8;
  --text:   #111827;
  --sub:    #6b7280;
}
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
}
html, body { height: 100%; background: var(--bg); color: var(--text); }
#app { display: flex; flex-direction: column; height: 100%; }

.hd {
  background: var(--card); border-bottom: 2px solid var(--border);
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.hd-title { font-size: 20px; font-weight: 800; }
.dot { width: 12px; height: 12px; border-radius: 50%; background: #f59e0b; }
.dot.ok { background: var(--green); box-shadow: 0 0 0 3px #bbf7d0; }

.scroll { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }

.lbl {
  font-size: 12px; font-weight: 800; color: var(--sub);
  text-transform: uppercase; letter-spacing: .1em;
  margin-bottom: 8px; padding-left: 2px;
}

.camera-card {
  background: var(--card); border-radius: 16px;
  border: 2px solid var(--border); overflow: hidden; margin-bottom: 16px;
}
.camera-area {
  width: 100%; aspect-ratio: 4/3; background: #1a1d23;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
#preview { width: 100%; height: 100%; object-fit: cover; display: none; }
#capturedImg { width: 100%; height: 100%; object-fit: cover; display: none; }
.camera-placeholder {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px; color: #4b5563;
}
.camera-icon { font-size: 64px; }
.camera-hint { font-size: 14px; font-weight: 600; color: #9ca3af; }

.camera-btns { display: flex; border-top: 2px solid var(--border); }
.cam-btn {
  flex: 1; padding: 16px; border: none; background: var(--bg);
  font-size: 15px; font-weight: 800; color: var(--blue); cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.cam-btn:first-child { border-right: 1px solid var(--border); }
.cam-btn:active { background: #e0e8ff; }
.cam-btn.orange { color: var(--orange); }

/* 候補カード */
.result-card {
  background: var(--card); border-radius: 16px;
  border: 2px solid var(--border); overflow: hidden; margin-bottom: 16px; display: none;
}
.result-card.show { display: block; }
.result-title {
  font-size: 12px; font-weight: 800; color: var(--sub);
  text-transform: uppercase; letter-spacing: .08em;
  padding: 12px 16px; background: #f5f7fc; border-bottom: 2px solid var(--border);
}

.candidate {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .15s;
}
.candidate:last-child { border-bottom: none; }
.candidate:active { background: #e8efff; }
.candidate.selected { background: #e8efff; border-left: 4px solid var(--blue); }
.cand-img {
  width: 64px; height: 64px; border-radius: 10px; object-fit: cover;
  border: 1px solid var(--border); flex-shrink: 0; background: var(--bg);
}
.cand-info { flex: 1; }
.cand-code { font-size: 20px; font-weight: 900; color: var(--text); }
.cand-name { font-size: 13px; color: var(--sub); margin-top: 2px; font-weight: 600; }
.cand-check {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #fff; flex-shrink: 0;
}
.candidate.selected .cand-check { background: var(--blue); border-color: var(--blue); }

.decide-btn {
  width: 100%; padding: 18px; margin-bottom: 16px;
  border: none; border-radius: 16px;
  background: var(--blue); color: #fff;
  font-size: 18px; font-weight: 900; cursor: pointer; display: none;
}
.decide-btn.show { display: block; }
.decide-btn:active { background: #0f4fd6; }

#fileInput { display: none; }

.ov {
  position: fixed; inset: 0; z-index: 400;
  background: rgba(238,241,247,.92);
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 18px;
}
.ov.show { display: flex; }
.ov-msg { font-size: 17px; font-weight: 700; color: var(--sub); text-align: center; padding: 0 20px; line-height: 1.7; }
@keyframes spin { to { transform: rotate(360deg); } }
.ring {
  width: 56px; height: 56px;
  border: 6px solid var(--border); border-top-color: var(--blue);
  border-radius: 50%; animation: spin .75s linear infinite;
}

.toast {
  position: fixed; bottom: 40px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #111827ee; color: #fff;
  padding: 16px 28px; border-radius: 100px;
  font-size: 16px; font-weight: 700;
  white-space: pre-line; text-align: center; max-width: 86vw; line-height: 1.5;
  opacity: 0; transition: opacity .25s, transform .25s;
  pointer-events: none; z-index: 450;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok   { background: #16a34aee; }
.toast.err  { background: #dc2626ee; }
</style>
</head>
<body>
<div id="app">
  <div class="hd">
    <div class="hd-title">🔍 画像で製品検索</div>
    <div class="dot" id="dot"></div>
  </div>

  <div class="scroll">
    <div class="lbl">製品を撮影してください</div>
    <div class="camera-card">
      <div class="camera-area">
        <video id="preview" playsinline autoplay muted></video>
        <img id="capturedImg" />
        <div class="camera-placeholder" id="placeholder">
          <div class="camera-icon">📷</div>
          <div class="camera-hint">カメラまたはアルバムから選択</div>
        </div>
      </div>
      <div class="camera-btns">
        <button class="cam-btn" onclick="openCamera()">📷 カメラ</button>
        <button class="cam-btn orange" onclick="openAlbum()">🖼 アルバム</button>
      </div>
    </div>

    <button id="searchBtn" style="
      width:100%; padding:18px; margin-bottom:16px;
      border:none; border-radius:16px;
      background:var(--blue); color:#fff;
      font-size:18px; font-weight:900; cursor:pointer; display:none;
    " onclick="doSearch()">🤖 AIで検索する</button>

    <div class="lbl" id="resultLbl" style="display:none;">候補を選んでください</div>
    <div class="result-card" id="resultCard">
      <div class="result-title">🤖 AIが選んだ候補</div>
      <div id="candidateList"></div>
    </div>

    <button class="decide-btn" id="decideBtn" onclick="decide()">
      ✅ この製品コードで入力する
    </button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" onchange="onFileSelected(this)" />

<div class="ov" id="ov">
  <div class="ring"></div>
  <div class="ov-msg" id="ovMsg">AIが分析中...<br>少々お待ちください</div>
</div>
<div class="toast" id="toast"></div>

<script>
// APIキーはGAS内に隠れているので安全！
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxvtJIqApBEx1aGUgDYe5qMoR8kKhOGi4MsKijc6lBQ-5Rs-TLJb0LHndx310y6zNLD/exec';
const APP_URL = 'https://matsu5635.github.io/product-input/app.html';

let capturedBase64 = '';
let capturedMime   = 'image/jpeg';
let selectedCode   = '';
let cameraStream   = null;

// ── 起動時確認 ───────────────────────────────────────
window.addEventListener('DOMContentLoaded', async function() {
  try {
    var res = await fetch(GAS_URL + '?action=getFiles');
    var json = await res.json();
    if (json.ok) document.getElementById('dot').classList.add('ok');
  } catch(e) {}
});

// ── カメラ ───────────────────────────────────────────
async function openCamera() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }
    });
    var video = document.getElementById('preview');
    video.srcObject = cameraStream;
    video.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('capturedImg').style.display = 'none';
    video.onclick = function() { capture(video); };
  } catch(e) { openAlbum(); }
}

function capture(video) {
  var canvas = document.createElement('canvas');
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  capturedBase64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
  capturedMime   = 'image/jpeg';
  if (cameraStream) { cameraStream.getTracks().forEach(function(t) { t.stop(); }); cameraStream = null; }
  showPreview('data:image/jpeg;base64,' + capturedBase64);
}

function openAlbum() { document.getElementById('fileInput').click(); }

function onFileSelected(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  capturedMime = file.type || 'image/jpeg';
  var reader = new FileReader();
  reader.onload = function(e) {
    capturedBase64 = e.target.result.split(',')[1];
    showPreview(e.target.result);
  };
  reader.readAsDataURL(file);
}

function showPreview(src) {
  var img = document.getElementById('capturedImg');
  img.src = src; img.style.display = 'block';
  document.getElementById('preview').style.display = 'none';
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('searchBtn').style.display = 'block';
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('resultLbl').style.display = 'none';
  document.getElementById('decideBtn').classList.remove('show');
  selectedCode = '';
}

// ── 検索（text/plainでCORS回避）────────────────────
async function doSearch() {
  if (!capturedBase64) { toast('画像を撮影してください', 'err'); return; }
  showOv('AIが画像を分析中...\n少々お待ちください');
  try {
    var res = await fetch(GAS_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain' },  // ← CORS回避のキモ
      body:    JSON.stringify({ action: 'search', image: capturedBase64, mime: capturedMime })
    });
    var json = await res.json();
    if (!json.ok) throw new Error(json.error || '検索失敗');
    showCandidates(json.candidates);
  } catch(e) {
    toast('エラー: ' + e.message, 'err');
  }
  hideOv();
}

// ── 候補表示 ─────────────────────────────────────────
function showCandidates(candidates) {
  if (!candidates || candidates.length === 0) {
    toast('候補が見つかりませんでした', 'err'); return;
  }
  var list = document.getElementById('candidateList');
  list.innerHTML = '';
  candidates.forEach(function(c) {
    var div = document.createElement('div');
    div.className    = 'candidate';
    div.dataset.code = c.code;
    var imgSrc = c.fileId
      ? 'https://drive.google.com/thumbnail?id=' + c.fileId + '&sz=w200'
      : '';
    div.innerHTML =
      '<img class="cand-img" src="' + imgSrc + '" onerror="this.style.background=\'#f5f7fc\';this.style.display=\'flex\'">' +
      '<div class="cand-info">' +
        '<div class="cand-code">' + c.code + '</div>' +
        '<div class="cand-name">' + (c.name || '－') + '</div>' +
      '</div>' +
      '<div class="cand-check">✓</div>';
    div.onclick = function() { selectCandidate(c.code); };
    list.appendChild(div);
  });
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('resultLbl').style.display = 'block';
}

function selectCandidate(code) {
  selectedCode = code;
  document.querySelectorAll('.candidate').forEach(function(el) {
    el.classList.toggle('selected', el.dataset.code === code);
  });
  document.getElementById('decideBtn').classList.add('show');
  document.getElementById('decideBtn').textContent = '✅ ' + code + ' を入力する';
  document.getElementById('decideBtn').scrollIntoView({ behavior: 'smooth' });
}

function decide() {
  if (!selectedCode) { toast('候補を選択してください', 'err'); return; }
  window.location.href = APP_URL + '?code=' + encodeURIComponent(selectedCode);
}

function showOv(m) { document.getElementById('ovMsg').innerHTML = m.replace('\n','<br>'); document.getElementById('ov').classList.add('show'); }
function hideOv()  { document.getElementById('ov').classList.remove('show'); }
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.className = 'toast'; }, 4000);
}
</script>
</body>
</html>

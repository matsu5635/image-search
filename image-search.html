<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>画像で製品検索</title>
<style>
:root {
  --blue:   #1565ff;
  --green:  #16a34a;
  --red:    #dc2626;
  --orange: #f97316;
  --bg:     #eef1f7;
  --card:   #ffffff;
  --border: #b8c0d8;
  --text:   #111827;
  --sub:    #6b7280;
}
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
}
html, body { height: 100%; background: var(--bg); color: var(--text); }
#app { display: flex; flex-direction: column; height: 100%; }

.hd {
  background: var(--card); border-bottom: 2px solid var(--border);
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.hd-title { font-size: 20px; font-weight: 800; }

.scroll { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }

.lbl {
  font-size: 12px; font-weight: 800; color: var(--sub);
  text-transform: uppercase; letter-spacing: .1em;
  margin-bottom: 8px; padding-left: 2px;
}

.camera-card {
  background: var(--card); border-radius: 16px;
  border: 2px solid var(--border);
  overflow: hidden; margin-bottom: 16px;
}
.camera-area {
  width: 100%; aspect-ratio: 4/3;
  background: #1a1d23;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
#preview { width: 100%; height: 100%; object-fit: cover; display: none; }
#capturedImg { width: 100%; height: 100%; object-fit: cover; display: none; }
.camera-placeholder {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: #4b5563;
}
.camera-icon { font-size: 64px; }
.camera-hint { font-size: 14px; font-weight: 600; color: #9ca3af; }

.camera-btns { display: flex; border-top: 2px solid var(--border); }
.cam-btn {
  flex: 1; padding: 16px;
  border: none; background: var(--bg);
  font-size: 15px; font-weight: 800; color: var(--blue);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.cam-btn:first-child { border-right: 1px solid var(--border); }
.cam-btn:active { background: #e0e8ff; }
.cam-btn.orange { color: var(--orange); }

/* AI分析結果 */
.analysis-card {
  background: var(--card); border-radius: 16px;
  border: 2px solid #a78bfa;
  padding: 16px; margin-bottom: 16px;
  display: none;
}
.analysis-card.show { display: block; }
.analysis-title {
  font-size: 12px; font-weight: 800; color: #7c3aed;
  text-transform: uppercase; letter-spacing: .08em;
  margin-bottom: 10px;
}
.analysis-text {
  font-size: 14px; color: var(--text); line-height: 1.7;
  background: #f5f3ff; border-radius: 10px; padding: 12px;
}

/* サンプル画像グリッド */
.grid-card {
  background: var(--card); border-radius: 16px;
  border: 2px solid var(--border);
  overflow: hidden; margin-bottom: 16px; display: none;
}
.grid-card.show { display: block; }
.grid-title {
  font-size: 12px; font-weight: 800; color: var(--sub);
  text-transform: uppercase; letter-spacing: .08em;
  padding: 12px 16px; background: #f5f7fc;
  border-bottom: 2px solid var(--border);
}
.img-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px; padding: 2px;
}
.grid-item {
  position: relative; aspect-ratio: 1;
  cursor: pointer; overflow: hidden;
  background: var(--bg);
}
.grid-item img {
  width: 100%; height: 100%; object-fit: cover;
  transition: opacity .15s;
}
.grid-item:active img { opacity: .7; }
.grid-item.selected::after {
  content: '✓';
  position: absolute; inset: 0;
  background: rgba(21,101,255,.6);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; color: #fff; font-weight: 900;
}
.grid-code {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,.6); color: #fff;
  font-size: 11px; font-weight: 700;
  padding: 3px 6px; text-align: center;
}

.decide-btn {
  width: 100%; padding: 18px; margin-bottom: 16px;
  border: none; border-radius: 16px;
  background: var(--blue); color: #fff;
  font-size: 18px; font-weight: 900; cursor: pointer; display: none;
}
.decide-btn.show { display: block; }
.decide-btn:active { background: #0f4fd6; }

#fileInput { display: none; }

.ov {
  position: fixed; inset: 0; z-index: 400;
  background: rgba(238,241,247,.92);
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 18px;
}
.ov.show { display: flex; }
.ov-msg { font-size: 16px; font-weight: 700; color: var(--sub); text-align: center; padding: 0 20px; line-height: 1.6; }
@keyframes spin { to { transform: rotate(360deg); } }
.ring {
  width: 56px; height: 56px;
  border: 6px solid var(--border); border-top-color: var(--blue);
  border-radius: 50%; animation: spin .75s linear infinite;
}

.toast {
  position: fixed; bottom: 40px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #111827ee; color: #fff;
  padding: 16px 28px; border-radius: 100px;
  font-size: 16px; font-weight: 700;
  white-space: pre-line; text-align: center; max-width: 86vw; line-height: 1.5;
  opacity: 0; transition: opacity .25s, transform .25s;
  pointer-events: none; z-index: 450;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok   { background: #16a34aee; }
.toast.err  { background: #dc2626ee; }
</style>
</head>
<body>
<div id="app">
  <div class="hd">
    <div class="hd-title">🔍 画像で製品検索</div>
  </div>

  <div class="scroll">
    <div class="lbl">製品を撮影してください</div>
    <div class="camera-card">
      <div class="camera-area" id="cameraArea">
        <video id="preview" playsinline autoplay muted></video>
        <img id="capturedImg" />
        <div class="camera-placeholder" id="placeholder">
          <div class="camera-icon">📷</div>
          <div class="camera-hint">タップして撮影 or アルバムから選択</div>
        </div>
      </div>
      <div class="camera-btns">
        <button class="cam-btn" onclick="openCamera()">📷 カメラ</button>
        <button class="cam-btn orange" onclick="openAlbum()">🖼 アルバム</button>
      </div>
    </div>

    <button id="searchBtn" style="
      width:100%; padding:18px; margin-bottom:16px;
      border:none; border-radius:16px;
      background:var(--blue); color:#fff;
      font-size:18px; font-weight:900; cursor:pointer; display:none;
    " onclick="doSearch()">🤖 AIで特徴を分析して検索</button>

    <!-- AI分析結果 -->
    <div class="analysis-card" id="analysisCard">
      <div class="analysis-title">🤖 AIの分析結果</div>
      <div class="analysis-text" id="analysisText"></div>
    </div>

    <!-- サンプル画像グリッド -->
    <div class="grid-card" id="gridCard">
      <div class="grid-title" id="gridTitle">サンプル画像から選んでください</div>
      <div class="img-grid" id="imgGrid"></div>
    </div>

    <button class="decide-btn" id="decideBtn" onclick="decide()">
      ✅ この製品コードで入力する
    </button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" onchange="onFileSelected(this)" />

<div class="ov" id="ov">
  <div class="ring"></div>
  <div class="ov-msg" id="ovMsg">AIが分析中...</div>
</div>
<div class="toast" id="toast"></div>

<script>
const GEMINI_KEY = 'AIzaSyC6ymhXGeS5kwavE8AsJSfcykAu7Fll4Mc';
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + GEMINI_KEY;
const GAS_URL    = 'https://script.google.com/macros/s/AKfycbxvtJIqApBEx1aGUgDYe5qMoR8kKhOGi4MsKijc6lBQ-5Rs-TLJb0LHndx310y6zNLD/exec';
const APP_URL    = 'https://matsu5635.github.io/product-input/app.html';

let capturedBase64 = '';
let capturedMime   = 'image/jpeg';
let selectedCode   = '';
let cameraStream   = null;
let fileList       = [];

// 起動時にファイル名一覧を取得
window.addEventListener('DOMContentLoaded', async function() {
  try {
    var res  = await fetch(GAS_URL + '?action=getFiles');
    var json = await res.json();
    if (json.ok) fileList = json.files || [];
  } catch(e) {}
});

// カメラ
async function openCamera() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }
    });
    var video = document.getElementById('preview');
    video.srcObject = cameraStream;
    video.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('capturedImg').style.display = 'none';
    video.onclick = function() { capture(video); };
  } catch(e) { openAlbum(); }
}

function capture(video) {
  var canvas = document.createElement('canvas');
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  capturedBase64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
  capturedMime   = 'image/jpeg';
  if (cameraStream) { cameraStream.getTracks().forEach(function(t) { t.stop(); }); cameraStream = null; }
  showPreview('data:image/jpeg;base64,' + capturedBase64);
}

function openAlbum() { document.getElementById('fileInput').click(); }

function onFileSelected(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  capturedMime = file.type || 'image/jpeg';
  var reader = new FileReader();
  reader.onload = function(e) {
    capturedBase64 = e.target.result.split(',')[1];
    showPreview(e.target.result);
  };
  reader.readAsDataURL(file);
}

function showPreview(src) {
  var img = document.getElementById('capturedImg');
  img.src = src; img.style.display = 'block';
  document.getElementById('preview').style.display = 'none';
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('searchBtn').style.display = 'block';
  document.getElementById('analysisCard').classList.remove('show');
  document.getElementById('gridCard').classList.remove('show');
  document.getElementById('decideBtn').classList.remove('show');
  selectedCode = '';
}

// ── STEP1: Geminiで画像の特徴を分析 ─────────────────
async function doSearch() {
  if (!capturedBase64) { toast('画像を撮影してください', 'err'); return; }
  showOv('AIが画像の特徴を分析中...\nしばらくお待ちください');

  try {
    var body = {
      contents: [{
        parts: [
          { inline_data: { mime_type: capturedMime, data: capturedBase64 } },
          { text: 'この製品画像の特徴を日本語で詳しく説明してください。袋や容器の色、形、ブランド名、製品名、文字、模様など見えるものをすべて箇条書きで教えてください。' }
        ]
      }]
    };

    var res  = await fetch(GEMINI_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    var json = await res.json();
    var analysis = json.candidates?.[0]?.content?.parts?.[0]?.text || '';

    if (!analysis) throw new Error('分析結果が取得できませんでした');

    // 分析結果を表示
    document.getElementById('analysisText').textContent = analysis;
    document.getElementById('analysisCard').classList.add('show');

    // サンプル画像を全件グリッド表示
    showOv('サンプル画像を読み込み中...');
    showImageGrid();

  } catch(e) {
    toast('エラー: ' + e.message, 'err');
  }
  hideOv();
}

// ── STEP2: サンプル画像をグリッド表示 ───────────────
function showImageGrid() {
  var grid = document.getElementById('imgGrid');
  grid.innerHTML = '';

  // 重複を除いたファイル一覧
  var seen  = {};
  var files = fileList.filter(function(f) {
    if (seen[f.name]) return false;
    seen[f.name] = true; return true;
  });

  document.getElementById('gridTitle').textContent =
    'サンプル画像から選んでください（' + files.length + '件）';

  files.forEach(function(f) {
    var div = document.createElement('div');
    div.className    = 'grid-item';
    div.dataset.code = f.name;

    var img = document.createElement('img');
    img.src = 'https://drive.google.com/thumbnail?id=' + f.id + '&sz=w200';
    img.onerror = function() { this.style.display = 'none'; };

    var label = document.createElement('div');
    label.className   = 'grid-code';
    label.textContent = f.name;

    div.appendChild(img);
    div.appendChild(label);
    div.onclick = function() { selectGrid(f.name, div); };
    grid.appendChild(div);
  });

  document.getElementById('gridCard').classList.add('show');
}

function selectGrid(code, el) {
  selectedCode = code;
  document.querySelectorAll('.grid-item').forEach(function(d) {
    d.classList.remove('selected');
  });
  el.classList.add('selected');
  document.getElementById('decideBtn').classList.add('show');
  document.getElementById('decideBtn').textContent = '✅ ' + code + ' を入力する';
  // スクロールして決定ボタンを表示
  document.getElementById('decideBtn').scrollIntoView({ behavior: 'smooth' });
}

function decide() {
  if (!selectedCode) { toast('画像を選択してください', 'err'); return; }
  window.location.href = APP_URL + '?code=' + encodeURIComponent(selectedCode);
}

function showOv(m) { document.getElementById('ovMsg').innerHTML = m.replace('\n','<br>'); document.getElementById('ov').classList.add('show'); }
function hideOv()  { document.getElementById('ov').classList.remove('show'); }
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.className = 'toast'; }, 4000);
}
</script>
</body>
</html>
